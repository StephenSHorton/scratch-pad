name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-aarch64:
    runs-on: macos-latest
    outputs:
      sig: ${{ steps.sig.outputs.sig }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - run: bun install
      - run: cd mcp-server && bun install
      - name: Build MCP sidecar
        run: cd mcp-server && bun build --compile --minify --target=bun-darwin-arm64 src/index.ts --outfile ../src-tauri/binaries/scratch-pad-mcp-aarch64-apple-darwin
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Scratch Pad ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install.'
          releaseDraft: true
          prerelease: false
          args: --target aarch64-apple-darwin
      - name: Read signature
        id: sig
        run: |
          SIG_FILE=$(find . -name "*.app.tar.gz.sig" -type f 2>/dev/null | head -1)
          if [ -n "$SIG_FILE" ]; then
            echo "sig=$(cat "$SIG_FILE")" >> $GITHUB_OUTPUT
          else
            echo "No .sig file found!"
            find . -name "*.sig" -type f 2>/dev/null
            exit 1
          fi

  build-x64:
    runs-on: macos-latest
    outputs:
      sig: ${{ steps.sig.outputs.sig }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - run: bun install
      - run: cd mcp-server && bun install
      - name: Build MCP sidecar
        run: cd mcp-server && bun build --compile --minify --target=bun-darwin-x64 src/index.ts --outfile ../src-tauri/binaries/scratch-pad-mcp-x86_64-apple-darwin
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Scratch Pad ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install.'
          releaseDraft: true
          prerelease: false
          args: --target x86_64-apple-darwin
      - name: Read signature
        id: sig
        run: |
          SIG_FILE=$(find . -name "*.app.tar.gz.sig" -type f 2>/dev/null | head -1)
          if [ -n "$SIG_FILE" ]; then
            echo "sig=$(cat "$SIG_FILE")" >> $GITHUB_OUTPUT
          else
            echo "No .sig file found!"
            find . -name "*.sig" -type f 2>/dev/null
            exit 1
          fi

  updater:
    needs: [build-aarch64, build-x64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Build and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="https://github.com/${{ github.repository }}"
          AARCH64_SIG="${{ needs.build-aarch64.outputs.sig }}"
          X64_SIG="${{ needs.build-x64.outputs.sig }}"

          echo "aarch64 sig length: ${#AARCH64_SIG}"
          echo "x64 sig length: ${#X64_SIG}"

          if [ -z "$AARCH64_SIG" ] || [ -z "$X64_SIG" ]; then
            echo "ERROR: Missing signatures!"
            exit 1
          fi

          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "Scratch Pad ${TAG}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${AARCH64_SIG}",
                "url": "${REPO}/releases/download/${TAG}/Scratch.Pad_aarch64.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "${X64_SIG}",
                "url": "${REPO}/releases/download/${TAG}/Scratch.Pad_x64.app.tar.gz"
              }
            }
          }
          EOF

          cat latest.json
          gh release upload "${TAG}" latest.json --repo "${{ github.repository }}" --clobber
