name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-aarch64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - run: bun install
      - run: cd mcp-server && bun install
      - name: Build MCP sidecar
        run: cd mcp-server && bun build --compile --minify --target=bun-darwin-arm64 src/index.ts --outfile ../src-tauri/binaries/scratch-pad-mcp-aarch64-apple-darwin
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Scratch Pad ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install.'
          releaseDraft: true
          prerelease: false
          args: --target aarch64-apple-darwin

  build-x64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - run: bun install
      - run: cd mcp-server && bun install
      - name: Build MCP sidecar
        run: cd mcp-server && bun build --compile --minify --target=bun-darwin-x64 src/index.ts --outfile ../src-tauri/binaries/scratch-pad-mcp-x86_64-apple-darwin
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Scratch Pad ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install.'
          releaseDraft: true
          prerelease: false
          args: --target x86_64-apple-darwin

  updater:
    needs: [build-aarch64, build-x64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Install Rust (for cargo install tauri-cli signing)
        uses: dtolnay/rust-toolchain@stable

      - name: Install tauri-cli for signing
        run: cargo install tauri-cli --version "^2" --locked

      - name: Download tar.gz bundles and sign them
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="https://github.com/${{ github.repository }}"

          # Download the tar.gz files from the release
          mkdir -p bundles
          gh release download "$TAG" --repo "${{ github.repository }}" --pattern "*.app.tar.gz" --dir bundles
          echo "Downloaded bundles:"
          ls -la bundles/

          # Sign each bundle
          cargo tauri signer sign bundles/Scratch.Pad_aarch64.app.tar.gz --private-key-path <(echo "$TAURI_SIGNING_PRIVATE_KEY") --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" 2>/dev/null || \
          cargo tauri signer sign "bundles/Scratch.Pad_aarch64.app.tar.gz" -k "$TAURI_SIGNING_PRIVATE_KEY" -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"

          cargo tauri signer sign bundles/Scratch.Pad_x64.app.tar.gz --private-key-path <(echo "$TAURI_SIGNING_PRIVATE_KEY") --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" 2>/dev/null || \
          cargo tauri signer sign "bundles/Scratch.Pad_x64.app.tar.gz" -k "$TAURI_SIGNING_PRIVATE_KEY" -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"

          AARCH64_SIG=$(cat bundles/Scratch.Pad_aarch64.app.tar.gz.sig)
          X64_SIG=$(cat bundles/Scratch.Pad_x64.app.tar.gz.sig)

          echo "aarch64 sig length: ${#AARCH64_SIG}"
          echo "x64 sig length: ${#X64_SIG}"

          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "Scratch Pad ${TAG}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${AARCH64_SIG}",
                "url": "${REPO}/releases/download/${TAG}/Scratch.Pad_aarch64.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "${X64_SIG}",
                "url": "${REPO}/releases/download/${TAG}/Scratch.Pad_x64.app.tar.gz"
              }
            }
          }
          EOF

          echo "Generated latest.json:"
          cat latest.json

          gh release upload "${TAG}" latest.json --repo "${{ github.repository }}" --clobber
