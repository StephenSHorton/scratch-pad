name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - uses: actions/github-script@v7
        id: create-release
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.GITHUB_REF_NAME,
              name: `Aizuchi ${process.env.GITHUB_REF_NAME}`,
              body: 'See the assets below to download and install.',
              draft: true,
              prerelease: false,
            })
            return data.id

  build-aarch64:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - run: bun install
      - run: cd mcp-server && bun install
      - name: Build MCP sidecar
        run: cd mcp-server && bun build --compile --minify --target=bun-darwin-arm64 src/index.ts --outfile ../src-tauri/binaries/aizuchi-mcp-aarch64-apple-darwin
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target aarch64-apple-darwin

  build-x64:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - run: bun install
      - run: cd mcp-server && bun install
      - name: Build MCP sidecar
        run: cd mcp-server && bun build --compile --minify --target=bun-darwin-x64 src/index.ts --outfile ../src-tauri/binaries/aizuchi-mcp-x86_64-apple-darwin
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target x86_64-apple-darwin

  build-linux:
    needs: create-release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
      - run: bun install
      - run: cd mcp-server && bun install
      - name: Build MCP sidecar
        run: cd mcp-server && bun build --compile --minify --target=bun-linux-x64 src/index.ts --outfile ../src-tauri/binaries/aizuchi-mcp-x86_64-unknown-linux-gnu
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --bundles deb,rpm

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - run: bun install
      - run: cd mcp-server && bun install
      - name: Build MCP sidecar
        run: cd mcp-server && bun build --compile --minify --target=bun-windows-x64 src/index.ts --outfile ../src-tauri/binaries/aizuchi-mcp-x86_64-pc-windows-msvc.exe
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target x86_64-pc-windows-msvc
      # tauri-action@v0 uploads installers (exe, msi) but skips the NSIS
      # updater bundle. Upload it explicitly so the `updater` job can sign
      # it into latest.json's windows-x86_64 entry.
      - name: Upload Windows updater bundle
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis
          gh release upload "${GITHUB_REF_NAME}" \
            *_x64-setup.nsis.zip *_x64-setup.nsis.zip.sig \
            --repo "${{ github.repository }}" --clobber

  updater:
    needs: [build-aarch64, build-x64, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Install Rust (for cargo install tauri-cli signing)
        uses: dtolnay/rust-toolchain@stable

      - name: Install tauri-cli for signing
        run: cargo install tauri-cli --version "^2" --locked

      - name: Download tar.gz bundles and sign them
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="https://github.com/${{ github.repository }}"

          # Download the bundles from the release
          mkdir -p bundles
          gh release download "$TAG" --repo "${{ github.repository }}" --pattern "*.app.tar.gz" --dir bundles
          gh release download "$TAG" --repo "${{ github.repository }}" --pattern "*.nsis.zip" --dir bundles || echo "No NSIS bundle found (Windows build may still be running)"
          echo "Downloaded bundles:"
          ls -la bundles/

          # Sign macOS bundles
          cargo tauri signer sign bundles/Aizuchi_aarch64.app.tar.gz --private-key-path <(echo "$TAURI_SIGNING_PRIVATE_KEY") --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" 2>/dev/null || \
          cargo tauri signer sign "bundles/Aizuchi_aarch64.app.tar.gz" -k "$TAURI_SIGNING_PRIVATE_KEY" -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"

          cargo tauri signer sign bundles/Aizuchi_x64.app.tar.gz --private-key-path <(echo "$TAURI_SIGNING_PRIVATE_KEY") --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" 2>/dev/null || \
          cargo tauri signer sign "bundles/Aizuchi_x64.app.tar.gz" -k "$TAURI_SIGNING_PRIVATE_KEY" -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"

          AARCH64_SIG=$(cat bundles/Aizuchi_aarch64.app.tar.gz.sig)
          X64_SIG=$(cat bundles/Aizuchi_x64.app.tar.gz.sig)

          echo "aarch64 sig length: ${#AARCH64_SIG}"
          echo "x64 sig length: ${#X64_SIG}"

          # Sign Windows NSIS bundle if present
          WIN_PLATFORM=""
          NSIS_FILE=$(ls bundles/*_x64-setup.nsis.zip 2>/dev/null | head -1)
          if [ -n "$NSIS_FILE" ]; then
            cargo tauri signer sign "$NSIS_FILE" --private-key-path <(echo "$TAURI_SIGNING_PRIVATE_KEY") --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" 2>/dev/null || \
            cargo tauri signer sign "$NSIS_FILE" -k "$TAURI_SIGNING_PRIVATE_KEY" -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
            WIN_SIG=$(cat "${NSIS_FILE}.sig")
            NSIS_BASENAME=$(basename "$NSIS_FILE")
            echo "Windows sig length: ${#WIN_SIG}"
            WIN_PLATFORM=$(cat <<WINEOF
              ,"windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "${REPO}/releases/download/${TAG}/${NSIS_BASENAME}"
              }
          WINEOF
            )
          fi

          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "Aizuchi ${TAG}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${AARCH64_SIG}",
                "url": "${REPO}/releases/download/${TAG}/Aizuchi_aarch64.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "${X64_SIG}",
                "url": "${REPO}/releases/download/${TAG}/Aizuchi_x64.app.tar.gz"
              }${WIN_PLATFORM}
            }
          }
          EOF

          echo "Generated latest.json:"
          cat latest.json

          gh release upload "${TAG}" latest.json --repo "${{ github.repository }}" --clobber

          # Promote the draft created by create-release to a published release
          gh release edit "${TAG}" --repo "${{ github.repository }}" --draft=false
