name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: bun install

      - name: Install MCP server dependencies
        run: cd mcp-server && bun install

      - name: Build MCP sidecar binary
        run: |
          cd mcp-server
          bun build --compile --minify --target=bun-darwin-${{ contains(matrix.target, 'aarch64') && 'arm64' || 'x64' }} src/index.ts --outfile ../src-tauri/binaries/scratch-pad-mcp-${{ matrix.target }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Scratch Pad ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Find and upload signature artifact
        run: |
          SIG_FILE=$(find src-tauri/target -name "*.app.tar.gz.sig" 2>/dev/null | head -1)
          if [ -n "$SIG_FILE" ]; then
            echo "Found sig: $SIG_FILE"
            cp "$SIG_FILE" sig-${{ matrix.target }}.sig
          else
            echo "ERROR: No .sig file found!"
            find src-tauri/target -name "*.sig" 2>/dev/null
            exit 1
          fi

      - name: Upload signature artifact
        uses: actions/upload-artifact@v4
        with:
          name: sig-${{ matrix.target }}
          path: sig-${{ matrix.target }}.sig

  updater:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all sig artifacts
        uses: actions/download-artifact@v4
        with:
          path: sigs

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build latest.json
        run: |
          AARCH64_SIG=$(cat sigs/sig-aarch64-apple-darwin/sig-aarch64-apple-darwin.sig)
          X86_64_SIG=$(cat sigs/sig-x86_64-apple-darwin/sig-x86_64-apple-darwin.sig)
          TAG="${GITHUB_REF_NAME}"
          VERSION="${{ steps.version.outputs.version }}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="https://github.com/${{ github.repository }}"

          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "Scratch Pad ${TAG}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${AARCH64_SIG}",
                "url": "${REPO}/releases/download/${TAG}/Scratch.Pad_aarch64.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "${X86_64_SIG}",
                "url": "${REPO}/releases/download/${TAG}/Scratch.Pad_x64.app.tar.gz"
              }
            }
          }
          EOF

          echo "Generated latest.json:"
          cat latest.json

      - name: Upload latest.json to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" latest.json --clobber
